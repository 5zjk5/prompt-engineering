# ── 前端 Nginx 配置 ──────────────────────────────────────
# 提供静态文件 + 反向代理后端 API

server {
    listen 80;
    server_name _;

    # 前端静态文件根目录
    root /usr/share/nginx/html;
    index index.html;

    # 上传文件体积上限，与后端 MAX_UPLOAD_SIZE_MB 对齐
    client_max_body_size 50m;

    # 反向代理后端接口到 backend 容器（compose 服务名）
    location /api/ {
        proxy_pass http://backend:7396;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 流式响应（SSE）需要关闭缓冲，确保大模型流式输出实时到达前端
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # 反向代理后端静态图片服务
    location /images/ {
        proxy_pass http://backend:7396;
        proxy_set_header Host $host;
    }

    # SPA 路由回退：未命中的路径统一返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
